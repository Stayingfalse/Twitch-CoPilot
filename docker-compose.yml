version: '3.8'

services:
  twitch-copilot:
    build: .
    container_name: twitch-copilot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - TRANSCRIPT_SOURCE=live
    volumes:
      # Optional: mount .env file
      - ./.env:/app/.env:ro
      # Optional: persist logs
      - ./logs:/app/logs
      # Recommended: persist enrolled channel settings (CHANNEL_STORE_PATH)
      - ./data:/app/data
    ports:
      - "3000:3000"
    networks:
      - copilot-network

networks:
  copilot-network:
    driver: bridge
